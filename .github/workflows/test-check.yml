name: test-check

on:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: source

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm test

      - name: setup git config
        run: |
          git config user.name "Bot"
          git config user.email "<>"

      - name: Prepare template
        run: |
          git checkout --orphan main
          echo "import Validator from './src/Validator.js';" > index.js
          echo "" >> index.js
          echo "export default Validator;" >> index.js
          echo "" > src/Validator.js
          echo "" > src/PasswordSchema.js
          git add -A
          git commit --no-verify -m "Rebuild template (auto)"
          git push -f --no-verify --set-upstream origin main
